<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orquesta AI - Consulta Rápida</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-size: 14px;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Orquesta AI</h1>
            <p>Cuéntanos sobre tu empresa en 3 preguntas</p>
        </div>
        
        <form id="contactForm">
            <div class="form-group">
                <label for="nombre">Tu nombre</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            
            <div class="form-group">
                <label for="empresa">¿A qué se dedica tu empresa?</label>
                <input type="text" id="empresa" name="empresa" placeholder="Ej: ecommerce, consultora, veterinaria..." required>
            </div>
            
            <div class="form-group">
                <label for="servicio">¿Qué proceso te gustaría automatizar?</label>
                <textarea id="servicio" name="servicio" placeholder="Ej: gestión de pedidos, consultas con clientes, facturación..." required></textarea>
            </div>
            
            <div class="form-group">
                <label for="empleados">¿Cuántos empleados tiene tu empresa?</label>
                <input type="number" id="empleados" name="empleados" min="1" placeholder="Ej: 5" required>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">Enviar Consulta</button>
            
            <div class="loading" id="loading">
                <p>Enviando...</p>
            </div>
            
            <div class="message" id="message"></div>
        </form>
    </div>
    
    <script>
        const form = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const message = document.getElementById('message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value.trim();
            const empresa = document.getElementById('empresa').value.trim();
            const servicio = document.getElementById('servicio').value.trim();
            const empleados = document.getElementById('empleados').value.trim();
            
            // Mostrar loading
            submitBtn.disabled = true;
            loading.style.display = 'block';
            message.style.display = 'none';
            
            try {
                // Enviar a servidor (necesitamos un endpoint en backend)
                const response = await fetch('/api/contacto', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        nombre: nombre,
                        empresa: empresa,
                        servicio: servicio,
                        empleados: parseInt(empleados)
                    })
                });
                
                const data = await response.json();
                
                loading.style.display = 'none';
                
                if (response.ok) {
                    message.classList.remove('error');
                    message.classList.add('success');
                    message.textContent = '✅ Consulta recibida. Nos contactaremos pronto.';
                    form.reset();
                    submitBtn.disabled = false;
                } else {
                    message.classList.remove('success');
                    message.classList.add('error');
                    message.textContent = '❌ Error: ' + (data.error || 'Intenta de nuevo');
                    submitBtn.disabled = false;
                }
            } catch (error) {
                loading.style.display = 'none';
                message.classList.remove('success');
                message.classList.add('error');
                message.textContent = '❌ Error de conexión. Intenta de nuevo.';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
